<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · API Key 管理后台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23243a66' stroke-width='2'><path d='M12 2 4 5v6c0 5 3.5 8 8 11 4.5-3 8-6 8-11V5z'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#ffffff;--ink:#0a0a0a;--ink2:#404040;--ink3:#8a8a8a;
    --line:#ececec;--line2:#d4d4d4;--surface:#fafafa;--err:#b3261e;--ok:#0a0a0a;
    --sans:"Geist","Inter",system-ui,-apple-system,"Helvetica Neue","PingFang SC","Microsoft YaHei",sans-serif;
    --mono:"JetBrains Mono",ui-monospace,SFMono-Regular,Menlo,monospace;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--sans);color:#fff;background:#0d0d0d;min-height:100vh;-webkit-font-smoothing:antialiased;
    background-image:radial-gradient(rgba(255,255,255,.06) 1px,transparent 1px);background-size:22px 22px;}
  .wrap{max-width:1080px;margin:0 auto;padding:30px 22px 70px;position:relative;}
  /* login */
  .login{max-width:380px;margin:13vh auto 0;background:#fff;border:1px solid var(--ink);border-radius:14px;padding:34px;
    box-shadow:8px 8px 0 -1px rgba(10,10,10,.06);}
  .login .brand{display:block;margin-bottom:20px;}
  .login h1{font-size:20px;font-weight:600;letter-spacing:-.01em;margin-bottom:6px;}
  .login p{color:var(--ink3);font-size:13px;margin-bottom:18px;font-family:var(--mono);}
  input,select,textarea{font-family:var(--sans);font-size:14px;color:var(--ink);background:#fff;
    border:1px solid var(--line2);border-radius:9px;padding:11px 13px;width:100%;outline:none;transition:border-color .15s,box-shadow .15s;}
  input:focus,select:focus,textarea:focus{border-color:var(--ink);box-shadow:0 0 0 3px rgba(10,10,10,.07);}
  .btn{background:var(--ink);color:#fff;border:1px solid var(--ink);border-radius:9px;padding:11px 18px;
    font-family:var(--sans);font-weight:500;font-size:14px;cursor:pointer;transition:background .15s,color .15s;}
  .btn:hover{background:#fff;color:var(--ink);}
  .btn[disabled]{opacity:.5;cursor:not-allowed;background:var(--ink);color:#fff;}
  .btn.sm{padding:6px 12px;font-size:12px;border-radius:7px;}
  .btn.ghost{background:transparent;color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.28);}
  .btn.ghost:hover{background:rgba(255,255,255,.08);color:#fff;border-color:rgba(255,255,255,.5);}
  header.bar .btn.ghost{background:rgba(255,255,255,.06);color:rgba(255,255,255,.85);border:1px solid rgba(255,255,255,.25);}
  header.bar .btn.ghost:hover{background:#fff;color:#0d0d0d;border-color:#fff;}
  .btn.danger{background:#fff;color:var(--err);border:1px solid #e6b8b4;}
  .btn.danger:hover{background:var(--err);color:#fff;border-color:var(--err);}
  .err{color:var(--err);font-size:13px;margin-top:10px;min-height:18px;}
  /* header */
  header.bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;flex-wrap:wrap;gap:12px;}
  header.bar .left{display:flex;align-items:center;gap:12px;}
  header.bar h1{font-size:18px;font-weight:600;letter-spacing:-.01em;color:#fff;line-height:1;display:flex;align-items:center;gap:8px;}
  header.bar h1 span{font-family:var(--mono);}
  .brand{display:inline-flex;align-items:center;}
  .brand svg{height:20px;width:auto;display:block;}
  /* stats */
  .stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px;}
  .stat{background:#fff;border:1px solid #000;border-radius:10px;padding:14px 18px;min-width:118px;box-shadow:0 14px 36px -18px rgba(0,0,0,.7);}
  .stat .k{font-family:var(--mono);font-size:11px;letter-spacing:.06em;color:var(--ink3);text-transform:uppercase;}
  .stat .v{font-size:26px;font-weight:600;color:var(--ink);margin-top:3px;letter-spacing:-.02em;}
  .stat.rem .v{color:var(--ink);}
  /* alert */
  .alert{border-radius:10px;padding:11px 15px;font-size:13.5px;font-weight:500;margin-bottom:18px;display:none;border:1px solid;}
  .alert.low{display:block;background:#fff;color:var(--ink);border-color:#000;box-shadow:0 14px 36px -18px rgba(0,0,0,.7);}
  .alert.empty{display:block;background:#fff;color:var(--err);border-color:var(--err);box-shadow:0 14px 36px -18px rgba(0,0,0,.7);}
  /* panel */
  .panel{background:#fff;border:1px solid #000;border-radius:12px;padding:20px;margin-bottom:16px;box-shadow:0 18px 48px -22px rgba(0,0,0,.7);}
  .panel h2{font-size:14px;font-weight:600;margin-bottom:12px;}
  .panel h2 span{font-family:var(--mono);font-weight:400;font-size:12px;}
  .addrow{display:flex;gap:10px;flex-wrap:wrap;}
  .addrow input{flex:1;min-width:200px;}
  .toolbar{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap;}
  .toolbar .right{display:flex;align-items:center;gap:10px;}
  .live{font-family:var(--mono);font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:6px;}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--ink);animation:pulse 2s infinite;}
  @keyframes pulse{0%{opacity:1}50%{opacity:.25}100%{opacity:1}}
  /* table */
  table{width:100%;border-collapse:collapse;font-size:13px;}
  th,td{text-align:left;padding:10px 10px;border-bottom:1px solid var(--line);vertical-align:middle;}
  th{font-family:var(--mono);font-size:11px;color:var(--ink3);font-weight:400;text-transform:uppercase;letter-spacing:.05em;background:var(--surface);}
  td.key{font-family:var(--mono);font-size:12px;word-break:break-all;max-width:240px;}
  .pill{display:inline-block;font-family:var(--mono);font-size:11px;border-radius:5px;padding:3px 9px;border:1px solid;}
  .pill.full{color:var(--ink);background:#fff;border-color:var(--ink);}
  .pill.open{color:var(--ink3);background:var(--surface);border-color:var(--line2);}
  .pill.assigned{color:var(--ink);background:#fff;border-color:var(--ink);}
  .pill.unassigned{color:var(--ink3);background:var(--surface);border-color:var(--line2);}
  .bar-wrap{display:flex;align-items:center;gap:8px;}
  .bar-bg{flex:1;height:6px;background:var(--line);border-radius:999px;overflow:hidden;min-width:60px;}
  .bar-fill{height:100%;background:var(--ink);border-radius:999px;transition:width .4s;}
  .bar-fill.done{background:var(--ink);}
  .cnt{font-family:var(--mono);font-size:12px;color:var(--ink);white-space:nowrap;}
  tr.flash{animation:flash 1.6s ease;}
  @keyframes flash{0%{background:#f0f0f0}100%{background:transparent}}
  .acts{display:flex;gap:6px;flex-wrap:wrap;}
  .muted{color:var(--ink3);}
  .hidden{display:none;}
  .who{font-family:var(--mono);font-size:11.5px;color:var(--ink2);cursor:pointer;text-decoration:underline dotted;}
  @media(max-width:640px){.tablewrap{overflow-x:auto}table{min-width:720px}}
.brand-on-dark svg path, .brand-on-dark svg polygon{fill:#ffffff !important;}
  .brand-on-dark svg{opacity:.95;}
</style>
</head>
<body>
<div class="wrap">
  <div id="login" class="login">
    <span class="brand"><svg viewBox="0 0 502.5 170" role="img" aria-label="Z.AI"><defs><linearGradient id="azai" gradientUnits="userSpaceOnUse" x1="53" y1="-3" x2="78" y2="207"><stop offset="0" stop-color="#495966"/><stop offset="1" stop-color="#000000"/></linearGradient></defs><path fill="url(#azai)" d="M105,0L91,20c-2.2,3.2-5.8,5-9.7,5H5V0H105z"/><polygon fill="url(#azai)" points="200,0 80,170 0,170 120,0"/><path fill="url(#azai)" d="M95,170l14.1-20c2.2-3.1,5.8-5,9.7-5H195v25H95z"/><path fill="url(#azai)" d="M226,169.3v-30.8h29.4v30.8H226z"/><path fill="url(#azai)" d="M444,169.3h-30l-14.6-36.7h-75.3l-14.4,36.7h-29.4L348.1,0.5h26L444,169.3z M389.7,107.8l-28.2-71.2l-27.8,71.2H389.7z"/><path fill="url(#azai)" d="M474.8,169.3V0.5h27.7v168.8H474.8z"/></svg></span>
    <h1>管理后台</h1>
    <p>请输入管理员口令</p>
    <input id="pwd" type="password" placeholder="管理员口令" />
    <div class="err" id="loginErr"></div>
    <button class="btn" id="loginBtn" style="width:100%;margin-top:8px">登录</button>
  </div>

  <div id="dash" class="hidden">
    <header class="bar">
      <div class="left"><span class="brand brand-on-dark"><svg viewBox="0 0 502.5 170" role="img" aria-label="Z.AI"><defs><linearGradient id="azai" gradientUnits="userSpaceOnUse" x1="53" y1="-3" x2="78" y2="207"><stop offset="0" stop-color="#495966"/><stop offset="1" stop-color="#000000"/></linearGradient></defs><path fill="url(#azai)" d="M105,0L91,20c-2.2,3.2-5.8,5-9.7,5H5V0H105z"/><polygon fill="url(#azai)" points="200,0 80,170 0,170 120,0"/><path fill="url(#azai)" d="M95,170l14.1-20c2.2-3.1,5.8-5,9.7-5H195v25H95z"/><path fill="url(#azai)" d="M226,169.3v-30.8h29.4v30.8H226z"/><path fill="url(#azai)" d="M444,169.3h-30l-14.6-36.7h-75.3l-14.4,36.7h-29.4L348.1,0.5h26L444,169.3z M389.7,107.8l-28.2-71.2l-27.8,71.2H389.7z"/><path fill="url(#azai)" d="M474.8,169.3V0.5h27.7v168.8H474.8z"/></svg></span><h1>API Key 管理后台 <span id="whoami" style="color:rgba(255,255,255,.55);font-weight:400;font-family:var(--mono);font-size:13px;"></span></h1></div>
      <button class="btn ghost sm" id="logout">退出登录</button>
    </header>
    <div class="alert" id="alert"></div>
    <div class="alert" id="capAlert"></div>
    <div class="stats">
      <div class="stat"><div class="k">Key 总数</div><div class="v" id="sKeys">–</div></div>
      <div class="stat"><div class="k">已发满</div><div class="v" id="sFull">–</div></div>
      <div class="stat"><div class="k">已领取人数</div><div class="v" id="sClaimed">–</div></div>
      <div class="stat rem"><div class="k">剩余名额</div><div class="v" id="sRemain">–</div></div>
      <div class="stat"><div class="k">报名人数</div><div class="v" id="sWl">–</div></div>
    </div>
    <div class="panel">
      <h2>报名名单（白名单） <span id="wlStatus" style="font-size:12px;font-weight:400;color:var(--muted);"></span></h2>
      <p style="font-size:12.5px;color:var(--muted);margin:-4px 0 12px;">只有名单内的邮箱能领取 Key。把报名邮箱粘进来（每行一个，或逗号分隔都行）。</p>
      <textarea id="wlText" rows="5" placeholder="alice@example.com&#10;bob@example.com, carol@example.com&#10;…" style="width:100%;font-family:ui-monospace,Menlo,monospace;font-size:12px;border:1px solid var(--line);border-radius:10px;padding:10px;resize:vertical;"></textarea>
      <div style="display:flex;gap:10px;align-items:center;margin-top:8px;flex-wrap:wrap;">
        <button class="btn" id="wlAddBtn">导入名单</button>
        <button class="btn ghost sm" id="wlViewBtn">查看名单</button>
        <button class="btn danger sm" id="wlClearBtn">清空名单</button>
        <span class="err" id="wlMsg" style="margin:0;"></span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:12px;padding-top:12px;border-top:1px solid var(--line);flex-wrap:wrap;">
        <span style="font-size:12.5px;color:var(--ink3);font-family:var(--mono);">单个补加：</span>
        <input id="wlOne" placeholder="someone@example.com" style="flex:1;min-width:200px;" />
        <button class="btn sm" id="wlOneBtn">补加</button>
        <span class="err" id="wlOneMsg" style="margin:0;"></span>
      </div>
      <div id="wlList" class="hidden" style="margin-top:12px;max-height:260px;overflow:auto;border:1px solid var(--line);border-radius:10px;"></div>
    </div>

    <div class="panel">
      <h2>选手 Key 处理 <span>· 查领取 / 换 / 退</span></h2>
      <p style="font-size:12.5px;color:var(--ink3);margin:-4px 0 12px;">选手 Key 失效要换、或误领要退时用。换=旧名额作废发新的；退=放回名额可重领。</p>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <input id="lookupEmail" placeholder="选手邮箱" style="flex:1;min-width:220px;" />
        <button class="btn" id="lookupBtn">查询</button>
      </div>
      <div id="lookupResult" class="hidden" style="margin-top:12px;border:1px solid var(--line);border-radius:10px;padding:14px;"></div>
      <div class="err" id="lookupMsg" style="margin-top:8px;"></div>
    </div>

    <div class="panel">
      <h2>新增 API Key</h2>
      <div class="addrow">
        <input id="newKey" placeholder="API Key（必填）" />
        <input id="newSrc" placeholder="来源 Zai 邮箱（选填）" />
        <button class="btn" id="addBtn">添加</button>
      </div>
      <div class="err" id="addErr"></div>
      <div style="margin-top:14px;border-top:1px dashed var(--line);padding-top:14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer;" id="bulkToggle">
          <span style="font-size:13px;color:var(--accent);font-weight:600;">▸ 批量导入（一次粘贴多行）</span>
        </div>
        <div id="bulkBox" class="hidden" style="margin-top:10px;">
          <textarea id="bulkText" rows="6" placeholder="每行一个 Key；可选在 Key 后加逗号写来源邮箱，例如：&#10;abcd1234.xxxx, zai_test_045@mailinator.com&#10;（直接粘贴带序号的清单也行，会自动去掉序号）" style="width:100%;font-family:ui-monospace,Menlo,monospace;font-size:12px;border:1px solid var(--line);border-radius:10px;padding:10px;resize:vertical;"></textarea>
          <div style="display:flex;gap:10px;align-items:center;margin-top:8px;">
            <button class="btn" id="bulkBtn">批量导入</button>
            <span class="err" id="bulkMsg" style="margin:0;"></span>
          </div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="toolbar">
        <div class="right">
          <select id="filter" style="width:auto">
            <option value="all">全部</option>
            <option value="open">未发满</option>
            <option value="full">已发满</option>
          </select>
          <button class="btn ghost sm" id="refresh">手动刷新</button>
        </div>
        <div class="live"><span class="dot"></span> 实时刷新中（每 4 秒）· 每个 Key 上限 <span id="capLbl">10</span> 人</div>
      </div>
      <div class="tablewrap">
        <table>
          <thead><tr>
            <th>#</th><th>API Key</th><th>来源 Zai 邮箱</th><th>发放进度</th><th>状态</th><th>领取选手</th><th>操作</th>
          </tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let TOKEN = sessionStorage.getItem('adm') || '';
let timer = null;
let prevCount = {};

function authHeaders(){ return { 'Content-Type':'application/json', 'Authorization':'Bearer '+TOKEN }; }
async function api(pathname, opts={}){
  const r = await fetch(pathname, { ...opts, headers:{ ...authHeaders(), ...(opts.headers||{}) } });
  if (r.status === 401){ logout(); throw new Error('未授权'); }
  return r;
}
$('loginBtn').onclick = async () => {
  const pwd = $('pwd').value; $('loginErr').textContent=''; $('loginBtn').disabled=true;
  try{
    const r = await fetch('/api/admin/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pwd})});
    const d = await r.json().catch(()=>({}));
    if(!r.ok){ $('loginErr').textContent=(d&&d.message)||'口令错误'; return; }
    TOKEN = pwd; sessionStorage.setItem('adm', pwd);
    if(d&&d.name){ sessionStorage.setItem('admName', d.name); }
    enterDash();
  }catch(e){ $('loginErr').textContent='登录失败，请重试'; }
  finally{ $('loginBtn').disabled=false; }
};
$('pwd').addEventListener('keydown',e=>{ if(e.key==='Enter') $('loginBtn').click(); });
function logout(){ sessionStorage.removeItem('adm'); sessionStorage.removeItem('admName'); TOKEN=''; if(timer) clearInterval(timer);
  $('dash').classList.add('hidden'); $('login').classList.remove('hidden'); }
$('logout').onclick = logout;
function enterDash(){ $('login').classList.add('hidden'); $('dash').classList.remove('hidden');
  const nm=sessionStorage.getItem('admName'); if(nm) $('whoami').textContent='· '+nm;
  load(); if(timer) clearInterval(timer); timer = setInterval(load, 4000); }

let CAPVAL=10;
function renderStats(s){ CAPVAL=s.cap;
  $('sKeys').textContent=s.key_total; $('sFull').textContent=s.key_full;
  $('sClaimed').textContent=s.claimed; $('sRemain').textContent=s.remaining;
  $('sWl').textContent=s.whitelist;
  $('capLbl').textContent=s.cap;
  const ws=$('wlStatus'); if(ws){ ws.textContent = s.enforce ? '· 已启用（非名单邮箱不能领）' : '· 未启用（任何邮箱都能领）'; ws.style.color = s.enforce ? 'var(--ok)' : 'var(--err)'; }
  const ca=$('capAlert'); ca.className='alert';
  if(s.over_capacity){ ca.classList.add('empty'); ca.textContent='⚠️ 报名人数（'+s.whitelist+'）已超过总容量，剩余名额 '+s.remaining+'，请补充 Key。'; }
  else if(s.whitelist>0 && s.remaining>0 && s.whitelist>s.remaining){ ca.classList.add('low'); ca.textContent='提示：报名人数 '+s.whitelist+'，剩余名额 '+s.remaining+'，接近上限，留意补充。'; }
  const a=$('alert'); a.className='alert';
  if(s.empty){ a.classList.add('empty'); a.textContent='⚠️ 名额已全部发完（剩余 0），请尽快补充 Key。'; }
  else if(s.low){ a.classList.add('low'); a.textContent='⚠️ 剩余名额仅 '+s.remaining+' 个（阈值 '+s.threshold+'），请准备补充。'; }
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderTable(keys){
  const tb=$('tbody'); tb.innerHTML='';
  for(const k of keys){
    const tr=document.createElement('tr');
    if(prevCount[k.id]!=null && prevCount[k.id]!==k.claim_count) tr.className='flash';
    const pct=Math.round(k.claim_count / k.cap * 100);
    const names = (k.claimers||[]).map(c=>c.email).join(', ');
    tr.innerHTML =
      '<td>'+k.id+'</td>'+
      '<td class="key">'+esc(k.api_key)+'</td>'+
      '<td>'+(k.source_email?esc(k.source_email):'<span class="muted">—</span>')+'</td>'+
      '<td><div class="bar-wrap"><div class="bar-bg"><div class="bar-fill'+(k.is_full?' done':'')+'" style="width:'+pct+'%"></div></div>'+
        '<span class="cnt">'+k.claim_count+'/'+k.cap+'</span></div></td>'+
      '<td><span class="pill '+k.status+'">'+(k.is_full?'已发满':'可领取')+'</span></td>'+
      '<td>'+(k.claim_count>0?'<span class="who" title="'+esc(names)+'">'+k.claim_count+' 人 ▾</span>':'<span class="muted">—</span>')+'</td>'+
      '<td><div class="acts">'+
        '<button class="btn ghost sm" data-act="edit" data-id="'+k.id+'">改</button>'+
        (k.claim_count>0?'<button class="btn ghost sm" data-act="reset" data-id="'+k.id+'">重置</button>':'')+
        '<button class="btn danger sm" data-act="del" data-id="'+k.id+'">删</button>'+
      '</div></td>';
    tb.appendChild(tr);
    prevCount[k.id]=k.claim_count;
  }
}
async function load(){
  try{
    const r = await api('/api/admin/keys?status='+encodeURIComponent($('filter').value));
    const data = await r.json();
    renderStats(data.stats); renderTable(data.keys);
  }catch(e){}
}
$('filter').onchange = load; $('refresh').onclick = load;

$('addBtn').onclick = async () => {
  const api_key=$('newKey').value.trim(); const source_email=$('newSrc').value.trim();
  $('addErr').textContent='';
  if(!api_key){ $('addErr').textContent='API Key 不能为空'; return; }
  $('addBtn').disabled=true;
  try{
    const r=await api('/api/admin/keys',{method:'POST',body:JSON.stringify({api_key,source_email})});
    const d=await r.json();
    if(!r.ok){ $('addErr').textContent=d.message||'添加失败'; }
    else{ $('newKey').value=''; $('newSrc').value=''; load(); }
  }catch(e){ $('addErr').textContent='添加失败'; }
  finally{ $('addBtn').disabled=false; }
};

$('bulkToggle').onclick = () => {
  const box=$('bulkBox'); box.classList.toggle('hidden');
  $('bulkToggle').firstElementChild.textContent = (box.classList.contains('hidden')?'▸':'▾')+' 批量导入（一次粘贴多行）';
};
$('bulkBtn').onclick = async () => {
  const text=$('bulkText').value.trim();
  $('bulkMsg').style.color='var(--err)'; $('bulkMsg').textContent='';
  if(!text){ $('bulkMsg').textContent='请先粘贴内容'; return; }
  $('bulkBtn').disabled=true; $('bulkMsg').style.color='var(--muted)'; $('bulkMsg').textContent='导入中…';
  try{
    const r=await api('/api/admin/keys/bulk',{method:'POST',body:JSON.stringify({text})});
    const d=await r.json();
    if(!r.ok){ $('bulkMsg').style.color='var(--err)'; $('bulkMsg').textContent=d.message||'导入失败'; }
    else{
      $('bulkMsg').style.color='var(--ok)';
      $('bulkMsg').textContent=`完成：新增 ${d.added}，已存在跳过 ${d.skipped}${d.invalid?('，无效 '+d.invalid):''}`;
      $('bulkText').value=''; load();
    }
  }catch(e){ $('bulkMsg').style.color='var(--err)'; $('bulkMsg').textContent='导入失败'; }
  finally{ $('bulkBtn').disabled=false; }
};

// ---- 报名名单 ----
$('wlAddBtn').onclick = async () => {
  const text=$('wlText').value.trim();
  $('wlMsg').style.color='var(--err)'; $('wlMsg').textContent='';
  if(!text){ $('wlMsg').textContent='请先粘贴邮箱'; return; }
  $('wlAddBtn').disabled=true; $('wlMsg').style.color='var(--muted)'; $('wlMsg').textContent='导入中…';
  try{
    const r=await api('/api/admin/whitelist/bulk',{method:'POST',body:JSON.stringify({text})});
    const d=await r.json();
    if(!r.ok){ $('wlMsg').style.color='var(--err)'; $('wlMsg').textContent=d.message||'导入失败'; }
    else{ $('wlMsg').style.color='var(--ok)';
      $('wlMsg').textContent=`完成：新增 ${d.added}，已存在 ${d.skipped}${d.invalid?('，无效 '+d.invalid):''}`;
      $('wlText').value=''; load(); if(!$('wlList').classList.contains('hidden')) loadWhitelist(); }
  }catch(e){ $('wlMsg').style.color='var(--err)'; $('wlMsg').textContent='导入失败'; }
  finally{ $('wlAddBtn').disabled=false; }
};

$('wlOneBtn').onclick = async () => {
  const email=$('wlOne').value.trim(); $('wlOneMsg').style.color='var(--err)'; $('wlOneMsg').textContent='';
  if(!email){ $('wlOneMsg').textContent='请输入邮箱'; return; }
  $('wlOneBtn').disabled=true;
  try{
    const r=await api('/api/admin/whitelist',{method:'POST',body:JSON.stringify({email})});
    const d=await r.json();
    if(!r.ok){ $('wlOneMsg').textContent=d.message||'添加失败'; }
    else{ $('wlOneMsg').style.color='var(--ok)'; $('wlOneMsg').textContent=d.added?'已加入名单':'该邮箱已在名单'; $('wlOne').value=''; load(); if(!$('wlList').classList.contains('hidden')) loadWhitelist(); }
  }catch(e){ $('wlOneMsg').textContent='添加失败'; }
  finally{ $('wlOneBtn').disabled=false; }
};

// ---- 查领取 / 换 / 退 ----
async function doLookup(){
  const email=$('lookupEmail').value.trim();
  $('lookupMsg').textContent=''; $('lookupMsg').style.color='var(--err)';
  const box=$('lookupResult');
  if(!email){ $('lookupMsg').textContent='请输入邮箱'; return; }
  try{
    const r=await api('/api/admin/claim-lookup?email='+encodeURIComponent(email));
    const d=await r.json();
    box.classList.remove('hidden');
    if(!d.found){ box.innerHTML='<span class="muted" style="font-size:13px;">该选手尚未领取（不在领取记录中）。</span>'; return; }
    box.innerHTML =
      '<div style="font-size:12.5px;color:var(--ink2);margin-bottom:8px;">'+esc(d.email)+' · Key #'+d.key_id+' · '+(d.is_full?'该Key已发满':('该Key '+d.claim_count+'/'+CAPVAL))+'</div>'+
      '<div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">'+
        '<span class="keymono" style="font-family:var(--mono);font-size:13px;background:var(--surface);border:1px solid var(--line2);border-radius:8px;padding:8px 11px;word-break:break-all;">'+esc(d.api_key)+'</span>'+
        '<button class="btn sm" data-act="swap" data-email="'+encodeURIComponent(d.email)+'">换一个</button>'+
        '<button class="btn ghost sm" data-act="return" data-email="'+encodeURIComponent(d.email)+'">退回</button>'+
      '</div>';
  }catch(e){ $('lookupMsg').textContent='查询失败'; }
}
$('lookupBtn').onclick = doLookup;
$('lookupEmail').addEventListener('keydown',e=>{ if(e.key==='Enter') doLookup(); });
$('lookupResult').addEventListener('click', async (e)=>{
  const b=e.target.closest('button[data-act]'); if(!b) return;
  const email=b.dataset.email, act=b.dataset.act;
  if(act==='swap'){
    if(!confirm('给该选手换一个新 Key？旧名额将作废（不再发给别人），并随机分配一个新 Key。')) return;
    const r=await api('/api/admin/claim/swap',{method:'POST',body:JSON.stringify({email:decodeURIComponent(email)})});
    const d=await r.json();
    if(!r.ok){ $('lookupMsg').style.color='var(--err)'; $('lookupMsg').textContent=d.message||'换 Key 失败'; }
    else{ $('lookupMsg').style.color='var(--ok)'; $('lookupMsg').textContent='已换新 Key：'+d.key; doLookup(); load(); }
  }else if(act==='return'){
    if(!confirm('退回该选手的领取？名额放回池子，该选手可重新领取。')) return;
    const r=await api('/api/admin/claim/return',{method:'POST',body:JSON.stringify({email:decodeURIComponent(email)})});
    const d=await r.json();
    if(!r.ok){ $('lookupMsg').style.color='var(--err)'; $('lookupMsg').textContent=d.message||'退回失败'; }
    else{ $('lookupMsg').style.color='var(--ok)'; $('lookupMsg').textContent='已退回，名额放回池子。'; doLookup(); load(); }
  }
});
async function loadWhitelist(){
  try{
    const r=await api('/api/admin/whitelist'); const d=await r.json();
    const box=$('wlList'); box.classList.remove('hidden');
    if(!d.emails.length){ box.innerHTML='<div style="padding:14px;color:var(--muted);font-size:13px;">名单为空</div>'; return; }
    let html='<table style="width:100%"><thead><tr><th>邮箱</th><th style="width:90px;">状态</th><th style="width:60px;"></th></tr></thead><tbody>';
    for(const e of d.emails){
      html+='<tr><td style="font-size:12.5px;">'+esc(e.email)+'</td>'+
            '<td>'+(e.claimed?'<span class="pill full">已领取</span>':'<span class="pill open">未领取</span>')+'</td>'+
            '<td><button class="btn danger sm" data-wl="'+encodeURIComponent(e.email)+'">删</button></td></tr>';
    }
    html+='</tbody></table>';
    box.innerHTML=html;
  }catch(e){}
}
$('wlViewBtn').onclick = loadWhitelist;
$('wlClearBtn').onclick = async () => {
  if(!confirm('确定清空整个报名名单？清空后所有邮箱都将无法领取（除非关闭白名单）。')) return;
  await api('/api/admin/whitelist',{method:'DELETE'}); load(); loadWhitelist();
};
$('wlList').addEventListener('click', async (e)=>{
  const b=e.target.closest('button[data-wl]'); if(!b) return;
  if(!confirm('从名单移除该邮箱？')) return;
  await api('/api/admin/whitelist/'+b.dataset.wl,{method:'DELETE'}); load(); loadWhitelist();
});

$('tbody').addEventListener('click', async (e)=>{
  const who=e.target.closest('.who');
  if(who){ alert('领取该 Key 的选手：\n\n'+(who.getAttribute('title')||'')); return; }
  const btn=e.target.closest('button[data-act]'); if(!btn) return;
  const id=btn.dataset.id, act=btn.dataset.act;
  if(act==='edit'){
    const nk=prompt('新的 API Key（留空=不改）：'); if(nk===null) return;
    const ns=prompt('新的来源 Zai 邮箱（留空=清空该字段）：'); if(ns===null) return;
    const body={}; if(nk.trim()) body.api_key=nk.trim(); body.source_email=ns.trim();
    const r=await api('/api/admin/keys/'+id,{method:'PATCH',body:JSON.stringify(body)});
    if(!r.ok){ const d=await r.json(); alert(d.message||'修改失败'); } load();
  }else if(act==='reset'){
    if(!confirm('重置后该 Key 的计数器归零、清空所有领取记录，可重新发放。确定？')) return;
    await api('/api/admin/keys/'+id+'/reset',{method:'POST'}); load();
  }else if(act==='del'){
    if(!confirm('确定删除该 Key？其领取记录一并删除，不可恢复。')) return;
    await api('/api/admin/keys/'+id,{method:'DELETE'}); load();
  }
});

if(TOKEN){ enterDash(); }
</script>
</body>
